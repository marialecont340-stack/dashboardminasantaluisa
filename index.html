<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liderar con Respeto — Minera Santa Luisa</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#f0f4f8;
      --card:#ffffff;
      --border:rgba(43,69,133,0.14);
      --blue:#2B4585;
      --blue-light:#4a64a8;
      --green:#90BF3E;
      --gray:#6F6E6E;
      --a:#2B4585;--b:#90BF3E;--c:#6F6E6E;
      --text:#0f172a;
      --muted:#6F6E6E;
    }

    body {
      color:var(--text);
      font-family:'Segoe UI',Arial,sans-serif;
      min-height:100vh;
      padding:0 0 1.5rem;
      background:#f0f4f8;
    }

    /* ══ HEADER ══ */
    .top-bar{
      display:flex;align-items:center;justify-content:space-between;
      padding:1.1rem 2.5rem;
      background:#fff;
      border-bottom:4px solid var(--blue);
      flex-wrap:wrap;gap:0.75rem;
    }
    .top-left{display:flex;align-items:center;gap:1.25rem;}
    .main-logo{height:56px;width:auto;object-fit:contain;}
    .top-titles h1{font-size:clamp(1.1rem,2.2vw,1.8rem);font-weight:800;letter-spacing:0.02em;color:#0a1628;}
    .top-titles p{font-size:clamp(0.65rem,1vw,0.9rem);color:var(--blue);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
    .logos{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
    .partner-logo--aa{ background:#1a1a2e; }
    .partner-logo--exp{ }
    .partner-logo--influye{ }
    .logo-fallback{
      display:none;align-items:center;justify-content:center;
      height:56px;padding:6px 16px;
      background:#1a1a2e;color:#fff;
      font-size:0.75rem;font-weight:700;letter-spacing:0.04em;
      border-radius:6px;white-space:nowrap;
    }
    .partner-logo{
      height:52px;
      width:140px;
      object-fit:contain;
      display:block;
      padding:4px 8px;
      background:#f8fafc;
      border:1px solid rgba(30,58,138,0.1);
      border-radius:6px;
    }

    /* ══ LOGO BAR ══ */
    .logo-bar{
      background:#fff;
      padding:0.5rem 2rem;
      display:flex;align-items:center;justify-content:center;
      gap:2rem;
      border-bottom:1px solid rgba(0,0,0,0.1);
      flex-wrap:wrap;
    }

    /* ══ QUOTE BAR ══ */
    .quote-bar{
      background:linear-gradient(90deg,rgba(200,16,46,0.06),rgba(30,58,138,0.06));
      padding:0.55rem 2rem;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:0.75rem;
    }
    .quote-bar .q-icon{font-size:1.2rem;color:var(--blue);opacity:0.9;}
    .quote-bar p{font-size:clamp(0.7rem,1.2vw,0.88rem);color:#334155;font-style:italic;}

    /* ══ MAIN GRID ══ */
    .main{padding:0.75rem 1.5rem 0.75rem;display:flex;flex-direction:column;gap:0.75rem;}

    .scenarios-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;}

    /* ══ SCENARIO CARD ══ */
    .sc-wrapper{ display:flex; flex-direction:column; gap:0; }
    .sc-header-ext{
      padding:0.5rem 0.75rem 0.4rem;
      background:#ffffff;
      border-radius:12px 12px 0 0;
      border:1px solid rgba(30,58,138,0.12);
      border-bottom:none;
      display:flex; align-items:center; gap:0.6rem;
    }
    .sc-tag-ext{
      font-size:0.6rem; font-weight:800; letter-spacing:0.12em;
      text-transform:uppercase; color:#fff;
      background:var(--blue); border-radius:20px;
      padding:2px 8px; flex-shrink:0;
    }
    .sc-name-ext{
      font-size:clamp(0.8rem,1.2vw,0.95rem);
      font-weight:800; color:var(--blue);
    }
    .sc-card{
      background:#ffffff;border:1px solid rgba(30,58,138,0.12);
      border-radius:0 0 14px 14px;overflow:hidden;display:flex;flex-direction:column;
    }
    .sc-img-area{
      height:185px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,#0d1e35,#1a0a15);
      display:flex;align-items:flex-end;
    }
    .sc-img-area img{width:100%;height:100%;object-fit:cover;object-position:center;opacity:0.85;}
    .sc-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:rgba(255,255,255,0.5);letter-spacing:0.04em;}
    .sc-title-overlay{
      position:absolute;bottom:0;left:0;right:0;
      background:linear-gradient(transparent,rgba(0,0,0,0.82));
      padding:0.5rem 0.75rem;
    }
    .sc-tag{font-size:0.58rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:5px;}
    .sc-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);}
    .sc-name{font-size:clamp(0.8rem,1.3vw,1rem);font-weight:800;color:#0f172a;line-height:1.1;}

    .sc-body{padding:0.5rem 0.65rem;display:flex;flex-direction:column;gap:0.4rem;flex:1;}

    /* Donut + legend */
    .chart-row{display:flex;align-items:center;gap:0.75rem;}
    .donut-wrap{position:relative;width:75px;height:75px;flex-shrink:0;}
    .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .donut-center .pct-big{font-size:1.1rem;font-weight:800;color:#0f172a;line-height:1;}
    .donut-center .pct-lbl{font-size:0.5rem;color:#475569;text-transform:uppercase;letter-spacing:0.06em;}
    .legend{display:flex;flex-direction:column;gap:5px;flex:1;}
    .leg-row{display:flex;align-items:center;gap:6px;}
    .leg-left{display:flex;align-items:center;gap:5px;font-size:0.68rem;font-weight:700;color:var(--text);min-width:22px;}
    .leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
    .leg-bar-wrap{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;} .leg-bar{height:100%;border-radius:4px;transition:width 0.6s ease;} .leg-val{font-size:0.68rem;font-weight:700;color:var(--text);}
    .leg-pct{font-size:0.65rem;color:var(--muted);min-width:30px;text-align:right;}

    /* Winning answer */
    .winning-section{background:#eff6ff;border:1px solid rgba(37,99,235,0.2);border-radius:10px;padding:0.5rem 0.65rem;}
    .winning-lbl{font-size:0.58rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--blue-light);margin-bottom:0.3rem;}
    .winning-row{display:flex;align-items:flex-start;gap:0.5rem;background:#eef1f8;border-left:2px solid var(--blue);border-radius:0 8px 8px 0;padding:0.4rem 0.6rem;}
    .winning-badge{
      width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:0.9rem;font-weight:800;flex-shrink:0;margin-top:1px;
    }
    .winning-text{font-size:clamp(0.6rem,0.9vw,0.72rem);line-height:1.4;color:#1e293b;}

    /* Insight */
    .insight-section{display:flex;align-items:flex-start;gap:0.5rem;background:#eef1f8;border-left:4px solid var(--blue);border-radius:0 8px 8px 0;padding:0.45rem 0.65rem;}
    .insight-icon{font-size:1.6rem;flex-shrink:0;margin-top:2px;}
    .insight-inner{}
    .insight-lbl{font-size:0.7rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--blue);margin-bottom:5px;}
    .insight-text{font-size:clamp(0.75rem,1vw,0.85rem);line-height:1.5;color:#0f172a;font-weight:500;}

    /* Factores */
    .factores-section{}
    .factores-lbl{font-size:0.55rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .factores-row{display:flex;gap:5px;flex-wrap:wrap;}
    .factor-pill{
      background:#f1f5f9;border:1px solid var(--border);
      border-radius:20px;padding:2px 8px;
      font-size:0.58rem;color:#475569;
      display:flex;align-items:center;gap:3px;
    }

    /* Sin respuestas */
    .no-data{text-align:center;padding:1.5rem;color:var(--muted);font-size:0.75rem;font-style:italic;}

    /* ══ RESULTADOS CONSOLIDADOS ══ */
    .consolidado{
      background:#ffffff;border:1px solid rgba(30,58,138,0.12);border-radius:14px;
      padding:1rem 1.5rem;
    }
    .consolidado-title{font-size:clamp(0.9rem,1.4vw,1.1rem);font-weight:800;color:var(--blue);margin-bottom:0.75rem;letter-spacing:0.03em;}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.85rem;}
    .kpi-card{
      background:#f8fafc;border:1px solid var(--border);
      border-radius:12px;padding:0.75rem 1rem;
      display:flex;align-items:center;gap:0.85rem;
    }
    .kpi-icon{font-size:2rem;flex-shrink:0;}
    .kpi-right{}
    .kpi-pct{font-size:2rem;font-weight:800;line-height:1;}
    .kpi-name{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}
    .kpi-desc{font-size:0.65rem;color:var(--muted);line-height:1.3;margin-top:3px;}

    /* ══ TESTIMONIOS (carrusel continuo de compromisos, anónimo) ══ */
    .testimonios{
      background:linear-gradient(180deg,#ffffff,#f7f9fc);
      border:1px solid rgba(30,58,138,0.12);border-radius:16px;
      padding:1.1rem 0 1.3rem;overflow:hidden;
    }
    .testimonios-head{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;margin-bottom:0.85rem;}
    .testimonios-title{font-size:clamp(0.9rem,1.4vw,1.1rem);font-weight:800;color:var(--blue);letter-spacing:0.03em;display:flex;align-items:center;gap:8px;}
    .testimonios-title::before{content:'';width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--green),var(--blue));display:inline-block;}
    .testimonios-sub{font-size:0.65rem;color:var(--muted);font-weight:600;letter-spacing:0.04em;text-transform:uppercase;}

    .test-viewport{
      overflow:hidden;position:relative;
      -webkit-mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);
      mask-image:linear-gradient(90deg,transparent,#000 4%,#000 96%,transparent);
    }
    .test-track{
      display:flex;gap:1.1rem;width:max-content;padding:0.2rem 1.5rem;
      animation:test-scroll var(--test-duration,42s) linear infinite;
    }
    .test-viewport:hover .test-track{animation-play-state:paused;}
    @keyframes test-scroll{
      from{transform:translateX(0);}
      to{transform:translateX(-50%);}
    }

    .test-card{
      flex:0 0 300px;
      background:#ffffff;border:1px solid rgba(30,58,138,0.1);
      border-radius:14px;padding:1.1rem 1.2rem 1rem;
      box-shadow:0 4px 14px rgba(15,23,42,0.06);
      display:flex;flex-direction:column;gap:0.65rem;
      position:relative;
    }
    .test-card::before{
      content:'';position:absolute;top:0;left:1rem;right:1rem;height:3px;border-radius:0 0 4px 4px;
      background:var(--accent,var(--blue));
    }
    .test-top{display:flex;align-items:center;gap:0.55rem;}
    .test-avatar{
      width:34px;height:34px;border-radius:50%;flex-shrink:0;
      background:var(--accent,var(--blue));color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:0.85rem;font-weight:800;
    }
    .test-id{display:flex;flex-direction:column;line-height:1.15;}
    .test-anon{font-size:0.72rem;font-weight:800;color:#0f172a;}
    .test-tag{font-size:0.6rem;color:var(--muted);font-weight:600;letter-spacing:0.03em;}
    .test-stars{margin-left:auto;font-size:0.65rem;color:var(--green);letter-spacing:1px;}
    .test-quote-icon{font-size:1.6rem;line-height:0.6;color:var(--accent,var(--blue));opacity:0.25;font-weight:900;}
    .test-text{font-size:0.78rem;color:#1e293b;font-weight:500;line-height:1.5;}

    /* ══ FOOTER ══ */
    .foot{
      display:flex;align-items:center;justify-content:space-between;
      padding:0.5rem 1.5rem 0;flex-wrap:wrap;gap:0.5rem;
    }
    .foot-left{display:flex;align-items:center;gap:6px;font-size:0.65rem;color:#64748b;}
    .foot-clock{font-size:0.65rem;color:#64748b;}
    .foot-hash{font-size:0.65rem;color:var(--blue);font-weight:600;}

    /* ══ LOADING ══ */
    .status-msg{text-align:center;padding:3rem;color:var(--muted);font-size:0.9rem;}

    /* ══ RESPONSIVE ══ */
    @media(max-width:900px){
      .scenarios-grid{grid-template-columns:1fr;}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .top-bar{padding:0.75rem 1rem;}
      .main{padding:0.75rem 1rem;}
    }
    @media(max-width:600px){
      .logos{display:none;}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .test-card{flex:0 0 240px;}
    }
  </style>
</head>
<body>

<!-- HEADER -->

  <div class="top-left">
    <img class="main-logo" src="Logo_MineraSantaLuisa.png" alt="Minera Santa Luisa"/>

      <h1>LIDERAR CON RESPETO</h1>

<div class="main">

<script>
// Apps Script desplegado para el Sheet "Liderar con Respeto - Santa Luisa"
// (ver AppsScript_Code.gs si hay que volver a desplegarlo más adelante).
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxetVRyHh4CifACiPerJE5BJyeASxIIU7nesSNTvAKCv1ccVzGnMXWtTd-q4ZTpTYErgQ/exec';
const REFRESH_MS = 8000; // cada cuánto se actualiza el dashboard (en milisegundos)
const charts = {};

// ════════════════════════════════════════════════════════════════════
// Contenido de "Liderar con Respeto" — simulación de prevención del
// hostigamiento.
//
// Los INSIGHTS de aquí abajo son el RESPALDO: el dashboard primero busca
// el texto en la pestaña "Insights" del Sheet (cruzando por Momento +
// Opción). Si esa pestaña no responde o le falta alguna fila, usa estos.
// Edita el contenido real directamente en el Sheet, no aquí.
// ════════════════════════════════════════════════════════════════════
const SCENARIO_NAMES = { 1:'EL COMENTARIO INICIAL', 2:'INSISTENCIA REPETIDA', 3:'MENSAJES FUERA DE HORARIO' };

// Pon aquí el nombre del archivo de cada imagen (ej: 'Momento 1.png').
// Súbelas a la raíz del repo con esos mismos nombres.
const SCENARIO_IMAGES = { 1:'Momento 1.png', 2:'Momento 2.png', 3:'Momento 3.png' };

const OPTIONS_TEXT = {
  1:{ A:'Es un comentario normal.', B:'Puede resultar incómodo para algunas personas.', C:'Constituye claramente hostigamiento sexual.', D:'No estoy seguro.' },
  2:{ A:'Amabilidad entre compañeros.', B:'Interés personal legítimo.', C:'Reiteradas invitaciones que podrían generar incomodidad.', D:'No veo ningún problema.' },
  3:{ A:'Una conversación completamente normal.', B:'Un interés personal sin consecuencias.', C:'Una conducta que puede generar incomodidad y afectar el bienestar de la persona.', D:'No estoy seguro.' }
};

const INSIGHTS = {
  1:{
    A:'La mayoría percibió el comentario como algo normal. Comentarios sobre la apariencia, aunque parezcan halagos, pueden ser el primer paso de una dinámica de hostigamiento si no se cuestionan a tiempo.',
    B:'La mayoría reconoció que el comentario podría incomodar a otras personas. Esa sensibilidad es clave: lo que parece un cumplido puede sentirse como una invasión, dependiendo de quién lo dice y en qué contexto.',
    C:'La mayoría identificó el comentario como hostigamiento sexual desde el primer momento. Reconocer estas señales tempranas es fundamental para prevenir que la situación escale.',
    D:'La mayoría no tuvo certeza sobre cómo interpretar la situación. La duda frente a estos comentarios es común — por eso es importante generar espacios donde consultar y reportar sin temor.'
  },
  2:{
    A:'La mayoría interpretó la insistencia como simple amabilidad. Repetir una invitación después de respuestas evasivas suele ser una señal de que no se están leyendo las señales de incomodidad.',
    B:'La mayoría vio esto como un interés personal legítimo. Sin embargo, la reiteración pese a las respuestas evasivas de Andrea es justamente lo que distingue el interés genuino de una insistencia que ignora los límites.',
    C:'La mayoría identificó que la insistencia, más allá de la intención, puede generar incomodidad. Repetir una invitación después de respuestas evasivas es una señal de alerta que vale la pena reconocer.',
    D:'La mayoría no percibió ningún problema en la situación. Es común no notar la insistencia cuando no se está en el lugar de quien la recibe — por eso es clave entrenar la mirada hacia cómo se siente la otra persona.'
  },
  3:{
    A:'La mayoría consideró los mensajes nocturnos como una conversación normal. El silencio de Andrea y la insistencia posterior de Carlos son señales que merecen más atención de la que recibieron.',
    B:'La mayoría no vio consecuencias en estos mensajes. Pero presionar a alguien por no responder fuera del horario laboral sí tiene un efecto: genera presión e incomodidad, incluso sin esa intención.',
    C:'La mayoría reconoció el impacto que estos mensajes pueden tener en el bienestar de la persona. Insistir después del silencio, y cuestionar ese silencio, es una conducta que cruza un límite importante.',
    D:'La mayoría no tuvo certeza frente a esta situación. Los mensajes fuera de horario y la presión por una respuesta son un área gris para muchas personas — reconocerlo es el primer paso para identificarlos mejor.'
  }
};

const FACTORES = {
  1:['💬 Comentario sobre apariencia','🌅 Primeras señales','🤔 Percepción individual'],
  2:['🔁 Insistencia repetida','🚩 Señal de alerta','🙅 Respuesta evasiva'],
  3:['🌙 Fuera de horario laboral','📱 Presión por respuesta','💭 Bienestar emocional']
};

const OPTION_COLORS = { A:"#2B4585", B:"#90BF3E", C:"#6F6E6E", D:"#A9B4C2" };

function parseCSV(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols = []; let inQ = false, col = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(col.trim()); col = ''; }
      else { col += ch; }
    }
    cols.push(col.trim());
    rows.push(cols);
  }
  return rows;
}

function calcData(rows) {
  // Estructura: Telefono | Nombre | Momento1 | Momento2 | Momento3 | Fecha
  const data = rows.slice(1).filter(r => r[2] && r[2].trim());
  console.log('Total filas:', data.length);
  data.forEach((r,i) => console.log(`Fila ${i+1}:`, JSON.stringify(r)));

  return [1,2,3].map(idx => {
    const col = idx + 1; // M1=col2, M2=col3, M3=col4
    const vA = data.filter(r => (r[col]||'').trim().toUpperCase()==='A').length;
    const vB = data.filter(r => (r[col]||'').trim().toUpperCase()==='B').length;
    const vC = data.filter(r => (r[col]||'').trim().toUpperCase()==='C').length;
    const vD = data.filter(r => (r[col]||'').trim().toUpperCase()==='D').length;
    const total = vA+vB+vC+vD;
    // Mayoría simple, sin jerarquía entre opciones (no hay respuesta "correcta")
    let mayoria = null;
    if (total > 0) {
      const counts = { A:vA, B:vB, C:vC, D:vD };
      mayoria = ['A','B','C','D'].reduce((best,k) => counts[k] > counts[best] ? k : best, 'A');
    }
    return {idx, vA, vB, vC, vD, total, mayoria};
  });
}

function renderDonut(id, vA, vB, vC, vD, total) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  const hasData = total > 0;
  charts[id] = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['A','B','C','D'],
      datasets:[{
        data: hasData ? [vA,vB,vC,vD] : [1,1,1,1],
        backgroundColor: hasData ? ['#2B4585','#90BF3E','#6F6E6E','#A9B4C2'] : ['#e2e8f0','#e2e8f0','#e2e8f0','#e2e8f0'],
        borderWidth: 0, hoverOffset: 4
      }]
    },
    options: {
      cutout:'68%', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{enabled:hasData} }
    }
  });
}

function renderScenarios(scenData, sheetInsights) {
  sheetInsights = sheetInsights || {};
  const grid = document.getElementById('scenarios-grid');
  Object.keys(charts).forEach(id => { if(charts[id]){charts[id].destroy();delete charts[id];} });
  grid.innerHTML = '';

  let totalAll = 0, totalA = 0, totalB = 0, totalC = 0, totalD = 0;
  scenData.forEach(({vA,vB,vC,vD,total}) => { totalAll+=total; totalA+=vA; totalB+=vB; totalC+=vC; totalD+=vD; });

  document.title = `Liderar con Respeto — ${totalAll} participantes`;

  scenData.forEach(({idx, vA, vB, vC, vD, total, mayoria}) => {
    const pct = v => total ? Math.round(v/total*100) : 0;
    const chartId = `chart-${idx}`;
    const votes = { A:vA, B:vB, C:vC, D:vD };
    const mayorPct = mayoria ? pct(votes[mayoria]) : 0;
    const winColor = mayoria ? OPTION_COLORS[mayoria] : '#666';
    const hasData = total > 0;

    const legendRows = ['A','B','C','D'].map(letter => `
            <div class="leg-row">
              <div class="leg-left"><span class="leg-sq" style="background:${OPTION_COLORS[letter]}"></span>${letter}</div>
              <div class="leg-bar-wrap"><div class="leg-bar" style="width:${pct(votes[letter])}%;background:${OPTION_COLORS[letter]}"></div></div>
              <span class="leg-pct">${pct(votes[letter])}%</span>
            </div>`).join('');

    const wrapper = document.createElement('div');
    wrapper.className = 'sc-wrapper';
    wrapper.innerHTML = `<div class="sc-header-ext"><span class="sc-tag-ext">MOMENTO ${idx}</span><span class="sc-name-ext">${SCENARIO_NAMES[idx]}</span></div>`;

    const card = document.createElement('div');
    card.className = 'sc-card';
    card.innerHTML = `
      <div class="sc-img-area">
        ${SCENARIO_IMAGES[idx]
          ? `<img src="${SCENARIO_IMAGES[idx]}" alt="Momento ${idx}" onerror="this.style.display='none'"/>`
          : `<div class="sc-img-placeholder">📷 Imagen pendiente</div>`}
      </div>
      <div class="sc-body">
        ${hasData ? `
        <div class="chart-row">
          <div class="donut-wrap">
            <canvas id="${chartId}" style="width:75px;height:75px;"></canvas>
            <div class="donut-center">
              <span class="pct-big" style="color:${winColor}">${mayorPct}%</span>
              <span class="pct-lbl">opción ${mayoria}</span>
            </div>
          </div>
          <div class="legend">${legendRows}
          </div>
        </div>
        <div class="insight-section">
          <span class="insight-icon">💬</span>
          <div class="insight-inner">
            <div class="insight-lbl">INSIGHT IA</div>
            <div class="insight-text">${(sheetInsights[idx] && sheetInsights[idx][mayoria]) || INSIGHTS[idx][mayoria]}</div>
          </div>
        </div>
        ` : `<div class="no-data">⏳ Sin respuestas aún...</div>`}
      </div>`;
    wrapper.appendChild(card);
    grid.appendChild(wrapper);
    if (hasData) renderDonut(chartId, vA, vB, vC, vD, total);
  });

  // Consolidado
  if (totalAll > 0) {
    const con = document.getElementById('consolidado');
    con.style.display = 'block';
    const kpiGrid = document.getElementById('kpi-grid');

    // Métricas agregadas sobre el total de respuestas (A+B+C+D) en los 3 momentos.
    // No califican respuestas como "correctas": describen patrones de percepción.
    const pctA = totalAll ? Math.round(totalA / totalAll * 100) : 0;
    const pctB = totalAll ? Math.round(totalB / totalAll * 100) : 0;
    const pctC = totalAll ? Math.round(totalC / totalAll * 100) : 0;
    const pctD = totalAll ? Math.round(totalD / totalAll * 100) : 0;

    kpiGrid.innerHTML = `
      <div class="kpi-card">
        <div class="kpi-icon">💬</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:${OPTION_COLORS.A}">${pctA}%</div>
          <div class="kpi-name" style="color:${OPTION_COLORS.A}">LO PERCIBEN COMO NORMAL</div>
          <div class="kpi-desc">Ven la situación como un comportamiento habitual</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">🤝</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:${OPTION_COLORS.B}">${pctB}%</div>
          <div class="kpi-name" style="color:${OPTION_COLORS.B}">LO ATRIBUYEN A BUENA INTENCIÓN</div>
          <div class="kpi-desc">Lo interpretan como amabilidad o interés genuino</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">🚩</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:${OPTION_COLORS.C}">${pctC}%</div>
          <div class="kpi-name" style="color:${OPTION_COLORS.C}">RECONOCEN LA SEÑAL DE ALERTA</div>
          <div class="kpi-desc">Identifican la conducta como una posible falta de respeto</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">❓</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:${OPTION_COLORS.D}">${pctD}%</div>
          <div class="kpi-name" style="color:${OPTION_COLORS.D}">TIENEN DUDAS</div>
          <div class="kpi-desc">No están seguros de cómo interpretar la situación</div>
        </div>
      </div>`;
  }
}

// ════════════════════════════════════════════════════════════════════
// TESTIMONIOS: carrusel continuo (estilo "reseñas destacadas") con los
// compromisos escritos por los participantes, tomados de la pestaña
// "Reflexiones_Compromisos" (columnas: Telefono | Nombre | Reflexión |
// Compromiso | Fecha). Es ANÓNIMO: no se muestra el nombre real, solo
// un rótulo genérico "Participante N". Se toman los primeros 8
// registros con Compromiso no vacío.
// ════════════════════════════════════════════════════════════════════
const TESTIMONIOS_LIMIT = 8;
const TEST_ACCENTS = ['#2B4585', '#90BF3E', '#6F6E6E'];
let testimonios = [];

function buildTestimonios(rows) {
  if (!rows) return [];
  return rows.slice(1)
    .filter(r => (r[3] || '').trim())
    .slice(0, TESTIMONIOS_LIMIT)
    .map(r => ({ compromiso: (r[3] || '').trim() }));
}

let testimoniosKey = '';

function renderTestimonios(list) {
  const section = document.getElementById('testimonios-section');
  const track = document.getElementById('testimonios-track');
  if (!list.length) { section.style.display = 'none'; return; }

  // El dashboard refresca datos cada pocos segundos; si los compromisos
  // no cambiaron, no se reescribe el track para no reiniciar la animación
  // (eso se vería como un salto/tirón cada vez que recarga).
  const key = JSON.stringify(list);
  if (key === testimoniosKey) { section.style.display = 'block'; return; }
  testimoniosKey = key;

  section.style.display = 'block';

  const cardHtml = (t, i) => {
    const accent = TEST_ACCENTS[i % TEST_ACCENTS.length];
    return `
    <div class="test-card" style="--accent:${accent}">
      <div class="test-top">
        <div class="test-avatar" style="background:${accent}">👤</div>
        <div class="test-id">
          <span class="test-anon">Participante ${i + 1}</span>
          <span class="test-tag">Capacitación Santa Luisa</span>
        </div>
        <div class="test-stars">★★★★★</div>
      </div>
      <div class="test-quote-icon">“</div>
      <div class="test-text">${t.compromiso}</div>
    </div>`;
  };

  // Se duplica la lista para lograr un loop infinito sin salto visible
  // (la animación CSS recorre translateX(0) -> translateX(-50%)).
  const items = list.map((t, i) => cardHtml(t, i)).join('')
              + list.map((t, i) => cardHtml(t, i)).join('');
  track.innerHTML = items;

  // Duración proporcional a la cantidad de tarjetas, para que la
  // velocidad de desplazamiento se vea siempre pareja y lenta.
  track.style.setProperty('--test-duration', `${list.length * 6}s`);
}

// Pide una pestaña del Sheet (vía Apps Script + JSONP) y devuelve su CSV
// como texto. Si falla o tarda más de 20s, devuelve null (no rompe nada).
function fetchSheetTab(nombrePestaña) {
  return new Promise((resolve) => {
    const cbName = 'cb_' + nombrePestaña.replace(/\s+/g,'_') + '_' + Date.now();
    const script = document.createElement('script');
    script.src = SHEET_URL + '?sheet=' + encodeURIComponent(nombrePestaña) + '&callback=' + cbName + '&t=' + Date.now();

    const cleanup = () => { delete window[cbName]; if (document.head.contains(script)) document.head.removeChild(script); };

    window[cbName] = function(csvText) { cleanup(); resolve(csvText || null); };
    script.onerror = function() { cleanup(); resolve(null); };
    document.head.appendChild(script);

    setTimeout(() => { if (window[cbName]) { cleanup(); resolve(null); } }, 20000);
  });
}

// Convierte las filas de la pestaña "Insights" en { Momento: { Opcion: texto } }
function buildSheetInsights(rows) {
  const out = {};
  if (!rows) return out;
  rows.slice(1).forEach(r => {
    const momento = parseInt((r[0]||'').trim(), 10);
    const opcion = (r[2]||'').trim().toUpperCase();
    const texto = (r[4]||'').trim();
    if (!momento || !opcion || !texto) return;
    if (!out[momento]) out[momento] = {};
    out[momento][opcion] = texto;
  });
  return out;
}

async function loadData() {
  const msg = document.getElementById('loading-msg');
  try {
    const [respCsv, insightsCsv, compromisosCsv] = await Promise.all([
      fetchSheetTab('Respuestas'),
      fetchSheetTab('Insights'),
      fetchSheetTab('Reflexiones_Compromisos')
    ]);
    if (!respCsv) {
      if (msg) msg.textContent = '⏳ Conectando con los datos (puede tardar unos segundos la primera vez)...';
      return false;
    }
    const sheetInsights = buildSheetInsights(insightsCsv ? parseCSV(insightsCsv) : null);
    renderScenarios(calcData(parseCSV(respCsv)), sheetInsights);

    testimonios = buildTestimonios(compromisosCsv ? parseCSV(compromisosCsv) : null);
    renderTestimonios(testimonios);
    return true;
  } catch (e) {
    if (msg) msg.textContent = '⏳ Conectando con los datos (puede tardar unos segundos la primera vez)...';
    return false;
  }
}

async function loop() {
  const ok = await loadData();
  // Mientras no haya cargado ni una vez, reintenta cada 3s (más rápido que el
  // ciclo normal) — una vez que ya mostró datos, sigue con el ciclo de siempre.
  const aunSinCargar = !!document.getElementById('loading-msg');
  setTimeout(loop, (!ok && aunSinCargar) ? 3000 : REFRESH_MS);
}

loop();
</script>
