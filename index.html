<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulación Experiencial — Noatum</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#f0f4f8;
      --card:#ffffff;
      --border:rgba(30,58,138,0.12);
      --red:#C8102E;
      --blue:#1e3a8a;
      --blue-light:#2563eb;
      --a:#f59e0b;--b:#2563eb;--c:#10b981;
      --teal:#2563eb;
      --text:#0f172a;
      --muted:#64748b;
    }

    body {
      color:var(--text);
      font-family:'Segoe UI',Arial,sans-serif;
      min-height:100vh;
      padding:0 0 1.5rem;
      background:#f0f4f8;
    }

    /* ══ HEADER ══ */
    .top-bar{
      display:flex;align-items:center;justify-content:space-between;
      padding:1.1rem 2.5rem;
      background:#fff;
      border-bottom:4px solid var(--red);
      flex-wrap:wrap;gap:0.75rem;
    }
    .top-left{display:flex;align-items:center;gap:1.25rem;}
    .noatum-logo{height:56px;width:auto;object-fit:contain;}
    .top-titles h1{font-size:clamp(1.1rem,2.2vw,1.8rem);font-weight:800;letter-spacing:0.02em;color:#0a1628;}
    .top-titles p{font-size:clamp(0.65rem,1vw,0.9rem);color:var(--red);font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}
    .logos{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;}
    .partner-logo--aa{ background:#1a1a2e; min-width:150px; height:52px; }
    .logo-fallback{
      display:none;align-items:center;justify-content:center;
      height:56px;padding:6px 16px;
      background:#1a1a2e;color:#fff;
      font-size:0.75rem;font-weight:700;letter-spacing:0.04em;
      border-radius:6px;white-space:nowrap;
    }
    .partner-logo{
      height:56px;
      width:auto;
      max-width:200px;
      min-width:100px;
      object-fit:contain;
      display:block;
      padding:5px 10px;
      background:#f8fafc;
      border:1px solid rgba(30,58,138,0.1);
      border-radius:6px;
    }

    /* ══ LOGO BAR ══ */
    .logo-bar{
      background:#fff;
      padding:0.5rem 2rem;
      display:flex;align-items:center;justify-content:center;
      gap:2rem;
      border-bottom:1px solid rgba(0,0,0,0.1);
      flex-wrap:wrap;
    }

    /* ══ QUOTE BAR ══ */
    .quote-bar{
      background:linear-gradient(90deg,rgba(200,16,46,0.06),rgba(30,58,138,0.06));
      padding:0.55rem 2rem;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:0.75rem;
    }
    .quote-bar .q-icon{font-size:1.2rem;color:var(--red);opacity:0.9;}
    .quote-bar p{font-size:clamp(0.7rem,1.2vw,0.88rem);color:#334155;font-style:italic;}

    /* ══ MAIN GRID ══ */
    .main{padding:0.5rem 1.5rem 0.5rem;display:flex;flex-direction:column;gap:0.5rem;}

    .scenarios-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;}

    /* ══ SCENARIO CARD ══ */
    .sc-wrapper{ display:flex; flex-direction:column; gap:0; }
    .sc-header-ext{
      padding:0.5rem 0.75rem 0.4rem;
      background:#ffffff;
      border-radius:12px 12px 0 0;
      border:1px solid rgba(30,58,138,0.12);
      border-bottom:none;
      display:flex; align-items:center; gap:0.6rem;
    }
    .sc-tag-ext{
      font-size:0.6rem; font-weight:800; letter-spacing:0.12em;
      text-transform:uppercase; color:#fff;
      background:var(--red); border-radius:20px;
      padding:2px 8px; flex-shrink:0;
    }
    .sc-name-ext{
      font-size:clamp(0.8rem,1.2vw,0.95rem);
      font-weight:800; color:var(--blue);
    }
    .sc-card{ border-radius:0 0 14px 14px !important; }
      background:#ffffff;border:1px solid rgba(30,58,138,0.12);
      border-radius:16px;overflow:hidden;display:flex;flex-direction:column;
    }
    .sc-img-area{
      height:110px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,#0d1e35,#1a0a15);
      display:flex;align-items:flex-end;
    }
    .sc-img-area img{width:100%;height:100%;object-fit:cover;object-position:center;opacity:0.85;}
    .sc-title-overlay{
      position:absolute;bottom:0;left:0;right:0;
      background:linear-gradient(transparent,rgba(0,0,0,0.82));
      padding:0.5rem 0.75rem;
    }
    .sc-tag{font-size:0.58rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:5px;}
    .sc-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--red);}
    .sc-name{font-size:clamp(0.8rem,1.3vw,1rem);font-weight:800;color:#0f172a;line-height:1.1;}

    .sc-body{padding:0.5rem 0.65rem;display:flex;flex-direction:column;gap:0.4rem;flex:1;}

    /* Donut + legend */
    .chart-row{display:flex;align-items:center;gap:0.75rem;}
    .donut-wrap{position:relative;width:75px;height:75px;flex-shrink:0;}
    .donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .donut-center .pct-big{font-size:1.1rem;font-weight:800;color:#0f172a;line-height:1;}
    .donut-center .pct-lbl{font-size:0.5rem;color:#475569;text-transform:uppercase;letter-spacing:0.06em;}
    .legend{display:flex;flex-direction:column;gap:5px;flex:1;}
    .leg-row{display:flex;align-items:center;gap:6px;}
    .leg-left{display:flex;align-items:center;gap:5px;font-size:0.68rem;font-weight:700;color:var(--text);min-width:22px;}
    .leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
    .leg-bar-wrap{flex:1;height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;} .leg-bar{height:100%;border-radius:4px;transition:width 0.6s ease;} .leg-val{font-size:0.68rem;font-weight:700;color:var(--text);}
    .leg-pct{font-size:0.65rem;color:var(--muted);min-width:30px;text-align:right;}

    /* Winning answer */
    .winning-section{background:#eff6ff;border:1px solid rgba(37,99,235,0.2);border-radius:10px;padding:0.5rem 0.65rem;}
    .winning-lbl{font-size:0.58rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--blue-light);margin-bottom:0.3rem;}
    .winning-row{display:flex;align-items:flex-start;gap:0.5rem;background:#fff5f5;border-left:2px solid var(--red);border-radius:0 8px 8px 0;padding:0.4rem 0.6rem;}
    .winning-badge{
      width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:0.9rem;font-weight:800;flex-shrink:0;margin-top:1px;
    }
    .winning-text{font-size:clamp(0.6rem,0.9vw,0.72rem);line-height:1.4;color:#1e293b;}

    /* Insight */
    .insight-section{display:flex;align-items:flex-start;gap:0.5rem;background:#fff0f0;border-left:4px solid var(--red);border-radius:0 8px 8px 0;padding:0.45rem 0.65rem;}
    .insight-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px;}
    .insight-inner{}
    .insight-lbl{font-size:0.62rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--red);margin-bottom:4px;}
    .insight-text{font-size:clamp(0.62rem,0.85vw,0.72rem);line-height:1.4;color:#0f172a;font-weight:500;}

    /* Factores */
    .factores-section{}
    .factores-lbl{font-size:0.55rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
    .factores-row{display:flex;gap:5px;flex-wrap:wrap;}
    .factor-pill{
      background:#f1f5f9;border:1px solid var(--border);
      border-radius:20px;padding:2px 8px;
      font-size:0.58rem;color:#475569;
      display:flex;align-items:center;gap:3px;
    }

    /* Sin respuestas */
    .no-data{text-align:center;padding:1.5rem;color:var(--muted);font-size:0.75rem;font-style:italic;}

    /* ══ RESULTADOS CONSOLIDADOS ══ */
    .consolidado{
      background:#ffffff;border:1px solid rgba(30,58,138,0.12);border-radius:14px;
      padding:0.6rem 1rem;
    }
    .consolidado-title{font-size:clamp(0.75rem,1.1vw,0.88rem);font-weight:800;color:var(--blue);margin-bottom:0.5rem;letter-spacing:0.03em;}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.6rem;}
    .kpi-card{
      background:#f8fafc;border:1px solid var(--border);
      border-radius:10px;padding:0.45rem 0.65rem;
      display:flex;align-items:center;gap:0.6rem;
    }
    .kpi-icon{font-size:1.2rem;flex-shrink:0;}
    .kpi-right{}
    .kpi-pct{font-size:1.3rem;font-weight:800;line-height:1;}
    .kpi-name{font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-top:1px;}
    .kpi-desc{font-size:0.52rem;color:var(--muted);line-height:1.2;margin-top:1px;}

    /* ══ FOOTER ══ */
    .foot{
      display:flex;align-items:center;justify-content:space-between;
      padding:0.5rem 1.5rem 0;flex-wrap:wrap;gap:0.5rem;
    }
    .foot-left{display:flex;align-items:center;gap:6px;font-size:0.65rem;color:#64748b;}
    .foot-clock{font-size:0.65rem;color:#64748b;}
    .foot-hash{font-size:0.65rem;color:var(--red);font-weight:600;}

    /* ══ LOADING ══ */
    .status-msg{text-align:center;padding:3rem;color:var(--muted);font-size:0.9rem;}

    /* ══ RESPONSIVE ══ */
    @media(max-width:900px){
      .scenarios-grid{grid-template-columns:1fr;}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
      .top-bar{padding:0.75rem 1rem;}
      .main{padding:0.75rem 1rem;}
    }
    @media(max-width:600px){
      .logos{display:none;}
      .kpi-grid{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="top-bar">
  <div class="top-left">
    <img class="noatum-logo" src="Logo_WSP_Noatum.png" alt="Noatum Logistics"/>
    <div class="top-titles">
      <h1>SIMULACIÓN EXPERIENCIAL</h1>
      <p>Decisiones bajo presión operacional</p>
    </div>
  </div>
  <div class="logos">
    <img class="partner-logo partner-logo--aa" src="Logo_angloamerican.png" alt="Anglo American" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><span class="logo-fallback">Anglo American</span>
    <img class="partner-logo" src="Logo_influye.png" alt="Influye" onerror="this.style.display='none'"/>
    <img class="partner-logo" src="Logo_explayrience.png" alt="Explayrience" onerror="this.style.display='none'"/>
  </div>
</div>

<div class="main">
  <!-- ESCENARIOS -->
  <div class="scenarios-grid" id="scenarios-grid">
    <div class="status-msg" id="loading-msg">⏳ Conectando con los datos...</div>
  </div>

  <!-- CONSOLIDADO -->
  <div class="consolidado" id="consolidado" style="display:none;">
    <div class="consolidado-title">RESULTADOS CONSOLIDADOS</div>
    <div class="kpi-grid" id="kpi-grid"></div>
  </div>
</div>

<!-- FOOTER -->
<div class="foot">
  <div class="foot-left">🕐 ACTUALIZADO EN TIEMPO REAL · <span id="last-update">—</span></div>
  <div class="foot-hash">#DecisionesQueTransforman</div>
</div>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR6beUttk7b30ZQN5irmhdZf8Ag3coB0YBMdGmmuHJOYJv6EK7eNFNu9r0xFBxBysCZgfx_vzbNi0jS/pub?gid=628326535&single=true&output=csv';
const REFRESH_MS = 30000;
const charts = {};

const SCENARIO_NAMES = { 1:'DESPACHO ATRASADO', 2:'GENTE EXPERIMENTADA', 3:'RESPETO DE JERARQUÍA' };
const SCENARIO_IMAGES = { 1:'Escenario 1.png', 2:'Escenario 2.png', 3:'Escenario 3.png' };

const OPTIONS_TEXT = {
  1:{ A:'Avanzar rápidamente para evitar más retraso operacional.', B:'Detener el movimiento hasta asegurar completamente la segregación y el área.', C:'Mover solo parte de la carga mientras terminan de acondicionar la zona.' },
  2:{ A:'Continuar la maniobra porque el personal tiene experiencia.', B:'Detener la actividad y retirar al personal expuesto de la línea de maniobra.', C:'Permitir terminar rápidamente para evitar retrasar la operación.' },
  3:{ A:'Continuar la operación porque la solicitud viene directamente del cliente.', B:'Detener el inicio de la maniobra hasta completar las validaciones y autorizaciones.', C:'Avanzar parcialmente mientras se termina de regularizar la documentación.' }
};

const INSIGHTS = {
  1:{ A:'⚠️ La mayoría priorizó recuperar el tiempo operacional aun con controles incompletos. La presión por cumplir puede desplazar decisiones preventivas y normalizar riesgos temporales.', B:'La mayoría priorizó asegurar completamente el área antes de continuar la maniobra. Esto refleja una cultura preventiva donde la intervención oportuna se mantiene incluso bajo presión operacional.', C:'La mayoría optó por una solución intermedia. Bajo presión, las operaciones tienden a negociar parcialmente el riesgo para evitar detener completamente la actividad.' },
  2:{ A:'⚠️ La mayoría confió en la experiencia del equipo para continuar. La costumbre y la confianza operacional pueden disminuir la percepción real del riesgo.', B:'La mayoría priorizó intervenir antes de continuar. La experiencia no reemplaza los controles ni la percepción activa del riesgo.', C:'⚠️ La mayoría permitió continuar para no afectar la continuidad. Bajo rutinas conocidas, el riesgo puede normalizarse sin generar intervención inmediata.' },
  3:{ A:'⚠️ La mayoría priorizó continuar por el nivel jerárquico de la solicitud. La presión operacional y la autoridad pueden influir en el cumplimiento de controles preventivos.', B:'La mayoría mantuvo el estándar preventivo antes de iniciar la maniobra. Los procedimientos se sostienen incluso bajo presión operacional o solicitudes jerárquicas.', C:'⚠️ La mayoría avanzó parcialmente para mantener la continuidad. Bajo presión jerárquica, las operaciones tienden a flexibilizar temporalmente los estándares preventivos.' }
};

const FACTORES = {
  1:['⚡ Presión operacional','⚖️ Continuidad vs prevención','🧠 Toma de decisiones'],
  2:['⚠️ Exceso de confianza','👁️ Normalización del riesgo','🔥 Línea de fuego'],
  3:['👤 Autoridad operacional','🤝 Presión del cliente','🛡️ Liderazgo preventivo']
};

const OPTION_COLORS = { A:"#C8102E", B:"#1e3a8a", C:"#2563eb" };

function parseCSV(text) {
  const rows = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const cols = []; let inQ = false, col = '';
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(col.trim()); col = ''; }
      else { col += ch; }
    }
    cols.push(col.trim());
    rows.push(cols);
  }
  return rows;
}

function calcData(rows) {
  // Estructura: Telefono | Nombre | RespE1 | RespE2 | RespE3 | Fecha
  const data = rows.slice(1).filter(r => r[2] && r[2].trim());
  console.log('Filas:', data.length);

  return [1,2,3].map(idx => {
    const col = idx + 1; // E1=col2, E2=col3, E3=col4
    const vA = data.filter(r => (r[col]||'').trim().toUpperCase()==='A').length;
    const vB = data.filter(r => (r[col]||'').trim().toUpperCase()==='B').length;
    const vC = data.filter(r => (r[col]||'').trim().toUpperCase()==='C').length;
    const total = vA+vB+vC;
    let mayoria = null;
    if (total > 0) {
      mayoria = 'A';
      if (vB>=vA && vB>=vC) mayoria='B';
      else if (vC>vA && vC>vB) mayoria='C';
    }
    return {idx, vA, vB, vC, total, mayoria};
  });
}

function renderDonut(id, vA, vB, vC, total) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
  const hasData = total > 0;
  charts[id] = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['A','B','C'],
      datasets:[{
        data: hasData ? [vA,vB,vC] : [1,1,1],
        backgroundColor: hasData ? ['#C8102E','#1e3a8a','#f97316'] : ['#e2e8f0','#e2e8f0','#e2e8f0'],
        borderWidth: 0, hoverOffset: 4
      }]
    },
    options: {
      cutout:'68%', responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{enabled:hasData} }
    }
  });
}

function renderScenarios(scenData) {
  const grid = document.getElementById('scenarios-grid');
  Object.keys(charts).forEach(id => { if(charts[id]){charts[id].destroy();delete charts[id];} });
  grid.innerHTML = '';

  let totalAll = 0, totalB = 0, totalA = 0, totalC = 0;
  scenData.forEach(({vA,vB,vC,total}) => { totalAll+=total; totalA+=vA; totalB+=vB; totalC+=vC; });

  document.title = `Simulación Experiencial — ${totalAll} participantes`;

  scenData.forEach(({idx, vA, vB, vC, total, mayoria}) => {
    const pct = v => total ? Math.round(v/total*100) : 0;
    const chartId = `chart-${idx}`;
    const mayorPct = mayoria ? pct(mayoria==='A'?vA:mayoria==='B'?vB:vC) : 0;
    const winColor = mayoria ? OPTION_COLORS[mayoria] : '#666';
    const hasData = total > 0;

    const wrapper = document.createElement('div');
    wrapper.className = 'sc-wrapper';
    wrapper.innerHTML = `<div class="sc-header-ext"><span class="sc-tag-ext">SIMULACIÓN ${idx}</span><span class="sc-name-ext">${SCENARIO_NAMES[idx]}</span></div>`;

    const card = document.createElement('div');
    card.className = 'sc-card';
    card.innerHTML = `
      <div class="sc-img-area">
        <img src="${SCENARIO_IMAGES[idx]}" alt="Escenario ${idx}" onerror="this.style.display='none'"/>
      </div>
      <div class="sc-body">
        ${hasData ? `
        <div class="chart-row">
          <div class="donut-wrap">
            <canvas id="${chartId}" style="width:75px;height:75px;"></canvas>
            <div class="donut-center">
              <span class="pct-big" style="color:${winColor}">${mayorPct}%</span>
              <span class="pct-lbl">opción ${mayoria}</span>
            </div>
          </div>
          <div class="legend">
            <div class="leg-row">
              <div class="leg-left"><span class="leg-sq" style="background:#C8102E"></span>A</div>
              <div class="leg-bar-wrap"><div class="leg-bar" style="width:${pct(vA)}%;background:#C8102E"></div></div>
              <span class="leg-pct">${pct(vA)}%</span>
            </div>
            <div class="leg-row">
              <div class="leg-left"><span class="leg-sq" style="background:#1e3a8a"></span>B</div>
              <div class="leg-bar-wrap"><div class="leg-bar" style="width:${pct(vB)}%;background:#1e3a8a"></div></div>
              <span class="leg-pct">${pct(vB)}%</span>
            </div>
            <div class="leg-row">
              <div class="leg-left"><span class="leg-sq" style="background:#f97316"></span>C</div>
              <div class="leg-bar-wrap"><div class="leg-bar" style="width:${pct(vC)}%;background:#f97316"></div></div>
              <span class="leg-pct">${pct(vC)}%</span>
            </div>
          </div>
        </div>
        <div class="insight-section">
          <span class="insight-icon">${mayoria === 'B' ? '✅' : '⚠️'}</span>
          <div class="insight-inner">
            <div class="insight-lbl">INSIGHT IA</div>
            <div class="insight-text">${INSIGHTS[idx][mayoria]}</div>
          </div>
        </div>
        ` : `<div class="no-data">⏳ Sin respuestas aún...</div>`}
      </div>`;
    wrapper.appendChild(card);
    grid.appendChild(wrapper);
    if (hasData) renderDonut(chartId, vA, vB, vC, total);
  });

  // Consolidado
  if (totalAll > 0) {
    const con = document.getElementById('consolidado');
    con.style.display = 'block';
    const kpiGrid = document.getElementById('kpi-grid');
    const prevPct = Math.round(totalB/totalAll*100);
    const riskPct = Math.round(totalA/totalAll*100);
    const intPct  = Math.round((totalB/(totalAll||1))*100);
    const presPct = Math.round(((totalA+totalC)/(totalAll||1))*100);
    kpiGrid.innerHTML = `
      <div class="kpi-card">
        <div class="kpi-icon">✅</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:var(--blue)">${prevPct}%</div>
          <div class="kpi-name" style="color:var(--blue)">PREVENCIÓN</div>
          <div class="kpi-desc">Decisiones orientadas a la seguridad</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">⚠️</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:var(--red)">${riskPct}%</div>
          <div class="kpi-name" style="color:var(--red)">TOLERANCIA AL RIESGO</div>
          <div class="kpi-desc">Decisiones que aceptan riesgos bajo presión</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">🎯</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:var(--blue)">${intPct}%</div>
          <div class="kpi-name" style="color:var(--blue)">INTERVENCIÓN OPORTUNA</div>
          <div class="kpi-desc">Decisiones que detienen o corrigen a tiempo</div>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon">⚡</div>
        <div class="kpi-right">
          <div class="kpi-pct" style="color:var(--blue-light)">${presPct}%</div>
          <div class="kpi-name" style="color:var(--red)">PRESIÓN OPERACIONAL</div>
          <div class="kpi-desc">Decisiones influenciadas por tiempo o jerarquía</div>
        </div>
      </div>`;
  }

  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('es-PE');
}

async function loadData() {
  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    renderScenarios(calcData(parseCSV(text)));
  } catch(err) {
    const msg = document.getElementById('loading-msg');
    if (msg) msg.textContent = '❌ Error al conectar con Google Sheets.';
  }
}

loadData();
setInterval(loadData, REFRESH_MS);
</script>
</body>
</html>
